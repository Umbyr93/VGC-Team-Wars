databaseChangeLog:
  - changeSet:
      id: 001-base
      author: urusso
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: username
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: varchar(110)
                  constraints:
                    nullable: false
              - column:
                  name: discord_nickname
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: twitter_nickname
                  type: varchar(50)
                  constraints:
                    nullable: true
              - column:
                  name: full_name
                  type: varchar(100)
                  constraints:
                    nullable: true
              - column:
                  name: team_id
                  type: bigint
                  constraints:
                    nullable: true
              - column:
                  name: platform_admin
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: team_admin
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false